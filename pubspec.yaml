name: checkout_flow
description: >
  Flutter plugin for Checkout.com Flow payment components.
  Embeds the native Flow UI on Android and iOS to accept card payments,
  Apple Pay, Google Pay, and more.
version: 0.1.0
homepage: https://www.checkout.com/docs/payments/accept-payments
# TODO: Replace with your actual repository URL before publishing
# repository: https://github.com/YOUR_USERNAME/checkout_flow
# issue_tracker: https://github.com/YOUR_USERNAME/checkout_flow/issues

topics:
  - payments
  - checkout
  - payment-gateway
  - fintech

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.checkout.flow
        pluginClass: CheckoutFlowPlugin
      ios:
        pluginClass: CheckoutFlowPlugin
