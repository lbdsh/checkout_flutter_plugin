name: checkout_com_flow
description: >
  Flutter plugin for Checkout.com Flow payment components.
  Embeds the native Flow UI on Android and iOS to accept card payments,
  Apple Pay, Google Pay, and more.
version: 1.0.3
homepage: https://github.com/lbdsh/checkout_flutter_plugin
repository: https://github.com/lbdsh/checkout_flutter_plugin
issue_tracker: https://github.com/lbdsh/checkout_flutter_plugin/issues

topics:
  - payments
  - checkout
  - payment-gateway
  - fintech

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.checkout.flow
        pluginClass: CheckoutFlowPlugin
      ios:
        pluginClass: CheckoutFlowPlugin
